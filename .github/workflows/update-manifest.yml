# Auto-regenerate tournaments/<slug>/results/manifest.json whenever the
# CSVs in any tournament folder change on main. Each per-tournament stats
# page (tournaments/<slug>/index.html) fetches its own manifest, so the
# maintainer's flow is just "drop CSV in folder, push." The folder layout
# scales to multiple tournaments — adding tournaments/<new-slug>/results/
# and pushing a CSV is enough; this workflow regenerates the new manifest
# without any other edit.
#
# Path filter excludes the manifest files themselves so the bot's own
# commit doesn't bounce the workflow. (GITHUB_TOKEN-driven pushes also
# don't trigger workflows by default, but the explicit exclusion keeps
# the rule legible.)

name: Update tournament manifests

on:
  push:
    branches: [main]
    paths:
      - 'tournaments/*/results/**'
      - '!tournaments/*/results/manifest.json'

jobs:
  manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate every tournament manifest
        run: python scripts/update_manifests.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain tournaments)" ]]; then
            git config user.name  'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add tournaments
            git commit -m 'chore(stats): auto-regenerate tournament manifests'
            git push
          else
            echo 'manifests already up to date'
          fi
